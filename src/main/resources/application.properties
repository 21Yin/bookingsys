spring.application.name=bookingsys

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/bookingsys}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.quartz.job-store-type=memory
spring.quartz.auto-startup=true

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.cache.redis.time-to-live=600000

app.booking.lock-ttl-seconds=10
app.jwt.secret=VGhpc0lzQVN1ZmZpY2llbnRseUxvbmdCYXNlNjRTZWNyZXRGb3JKV1Q=
app.jwt.expiration-seconds=86400
app.basic-auth.username=${BASIC_AUTH_USERNAME:admin}
app.basic-auth.password=${BASIC_AUTH_PASSWORD:admin123}
