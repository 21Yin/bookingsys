<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .card { fill: #fffdfa; stroke: #2f3b35; stroke-width: 2; rx: 14; ry: 14; }
      .head { fill: #d8eadf; stroke: #2f3b35; stroke-width: 2; }
      .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1d2a24; }
      .field { font: 16px 'Consolas', 'Courier New', monospace; fill: #23312b; }
      .meta { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #42534b; }
      .line { stroke: #6a7d73; stroke-width: 2.5; fill: none; }
      .label { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #506159; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a7d73" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1180" />
  <text x="70" y="60" class="title" style="font-size:30px;">Booking System Database Structure</text>
  <text x="70" y="95" class="meta">Existing Spring Boot project ERD</text>

  <!-- app_users -->
  <rect class="card" x="70" y="140" width="330" height="270" />
  <rect class="head" x="70" y="140" width="330" height="52" />
  <text x="95" y="173" class="title">app_users</text>
  <text x="95" y="220" class="field">PK  id : bigint</text>
  <text x="95" y="248" class="field">UK  email : varchar(150)</text>
  <text x="95" y="276" class="field">password : varchar(255)</text>
  <text x="95" y="304" class="field">full_name : varchar(150)</text>
  <text x="95" y="332" class="field">verified : boolean</text>
  <text x="95" y="360" class="field">verification_token : varchar(120)</text>
  <text x="95" y="388" class="field">reset_password_token : varchar(120)</text>

  <!-- user_roles -->
  <rect class="card" x="70" y="470" width="330" height="160" />
  <rect class="head" x="70" y="470" width="330" height="52" />
  <text x="95" y="503" class="title">user_roles</text>
  <text x="95" y="550" class="field">PK/FK user_id : bigint</text>
  <text x="95" y="578" class="field">PK    role_name : enum</text>

  <!-- countries -->
  <rect class="card" x="520" y="70" width="330" height="180" />
  <rect class="head" x="520" y="70" width="330" height="52" />
  <text x="545" y="103" class="title">countries</text>
  <text x="545" y="150" class="field">PK  id : bigint</text>
  <text x="545" y="178" class="field">UK  code : varchar(10)</text>
  <text x="545" y="206" class="field">UK  name : varchar(100)</text>

  <!-- package_catalogs -->
  <rect class="card" x="520" y="310" width="360" height="250" />
  <rect class="head" x="520" y="310" width="360" height="52" />
  <text x="545" y="343" class="title">package_catalogs</text>
  <text x="545" y="390" class="field">PK  id : bigint</text>
  <text x="545" y="418" class="field">FK  country_id : bigint</text>
  <text x="545" y="446" class="field">name : varchar(120)</text>
  <text x="545" y="474" class="field">credits : int</text>
  <text x="545" y="502" class="field">price : decimal(10,2)</text>
  <text x="545" y="530" class="field">validity_days : int</text>
  <text x="545" y="558" class="field">active : boolean</text>

  <!-- class_schedules -->
  <rect class="card" x="960" y="70" width="380" height="280" />
  <rect class="head" x="960" y="70" width="380" height="52" />
  <text x="985" y="103" class="title">class_schedules</text>
  <text x="985" y="150" class="field">PK  id : bigint</text>
  <text x="985" y="178" class="field">FK  country_id : bigint</text>
  <text x="985" y="206" class="field">title : varchar(150)</text>
  <text x="985" y="234" class="field">description : varchar(500)</text>
  <text x="985" y="262" class="field">start_time : timestamp</text>
  <text x="985" y="290" class="field">end_time : timestamp</text>
  <text x="985" y="318" class="field">required_credits : int</text>
  <text x="985" y="346" class="field">capacity : int</text>
  <text x="985" y="374" class="field">version : bigint</text>

  <!-- purchased_packages -->
  <rect class="card" x="520" y="650" width="390" height="280" />
  <rect class="head" x="520" y="650" width="390" height="52" />
  <text x="545" y="683" class="title">purchased_packages</text>
  <text x="545" y="730" class="field">PK  id : bigint</text>
  <text x="545" y="758" class="field">FK  user_id : bigint</text>
  <text x="545" y="786" class="field">FK  package_catalog_id : bigint</text>
  <text x="545" y="814" class="field">total_credits : int</text>
  <text x="545" y="842" class="field">remaining_credits : int</text>
  <text x="545" y="870" class="field">purchased_at : timestamp</text>
  <text x="545" y="898" class="field">expires_at : timestamp</text>
  <text x="545" y="926" class="field">status : enum</text>

  <!-- bookings -->
  <rect class="card" x="980" y="470" width="420" height="320" />
  <rect class="head" x="980" y="470" width="420" height="52" />
  <text x="1005" y="503" class="title">bookings</text>
  <text x="1005" y="550" class="field">PK  id : bigint</text>
  <text x="1005" y="578" class="field">FK  user_id : bigint</text>
  <text x="1005" y="606" class="field">FK  schedule_id : bigint</text>
  <text x="1005" y="634" class="field">FK  purchased_package_id : bigint</text>
  <text x="1005" y="662" class="field">status : enum</text>
  <text x="1005" y="690" class="field">credits_charged : int</text>
  <text x="1005" y="718" class="field">booked_at : timestamp</text>
  <text x="1005" y="746" class="field">cancelled_at : timestamp</text>
  <text x="1005" y="774" class="field">checked_in_at : timestamp</text>
  <text x="1005" y="802" class="field">waitlist_position : int</text>

  <!-- credit_transactions -->
  <rect class="card" x="980" y="860" width="470" height="250" />
  <rect class="head" x="980" y="860" width="470" height="52" />
  <text x="1005" y="893" class="title">credit_transactions</text>
  <text x="1005" y="940" class="field">PK  id : bigint</text>
  <text x="1005" y="968" class="field">FK  user_id : bigint</text>
  <text x="1005" y="996" class="field">FK  purchased_package_id : bigint</text>
  <text x="1005" y="1024" class="field">FK  schedule_id : bigint (nullable)</text>
  <text x="1005" y="1052" class="field">type : enum</text>
  <text x="1005" y="1080" class="field">delta_credit : int</text>

  <!-- lines -->
  <path class="line" marker-end="url(#arrow)" d="M400 250 C455 250, 455 190, 520 190" />
  <text x="430" y="220" class="label">1..* roles</text>

  <path class="line" marker-end="url(#arrow)" d="M685 250 L685 310" />
  <text x="695" y="290" class="label">1..* catalogs</text>

  <path class="line" marker-end="url(#arrow)" d="M850 160 L960 160" />
  <text x="872" y="145" class="label">1..* schedules</text>

  <path class="line" marker-end="url(#arrow)" d="M400 305 C460 305, 460 758, 520 758" />
  <text x="420" y="515" class="label">1..* packages</text>

  <path class="line" marker-end="url(#arrow)" d="M700 560 L700 650" />
  <text x="710" y="612" class="label">template</text>

  <path class="line" marker-end="url(#arrow)" d="M400 340 C540 340, 540 606, 980 606" />
  <text x="560" y="392" class="label">1..* bookings</text>

  <path class="line" marker-end="url(#arrow)" d="M1145 350 L1145 470" />
  <text x="1155" y="420" class="label">1..* bookings</text>

  <path class="line" marker-end="url(#arrow)" d="M910 790 L980 790" />
  <text x="918" y="778" class="label">funds booking</text>

  <path class="line" marker-end="url(#arrow)" d="M400 360 C560 360, 560 968, 980 968" />
  <text x="565" y="1010" class="label">1..* transactions</text>

  <path class="line" marker-end="url(#arrow)" d="M910 830 C945 830, 945 996, 980 996" />
  <text x="852" y="910" class="label">package ledger</text>

  <path class="line" marker-end="url(#arrow)" d="M1210 790 L1210 860" />
  <text x="1220" y="834" class="label">schedule ref</text>
</svg>
